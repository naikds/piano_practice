<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport"
        content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<canvas id="gameCanvas"></canvas>
<div id="keyboard"></div>

<div id="startOverlay">TAP TO START</div>

<div id="songMenu">
  <div class="song" data-mode="free">FREE PLAY</div>
  <div class="song" data-url="midi/song1.mid">song1</div>
  <div class="song" data-url="midi/song2.mid">song2</div>
  <div class="song" data-url="midi/song3.mid">song3</div>
</div>

<div id="endMenu">
  <div class="endBtn" id="replayBtn">REPLAY</div>
  <div class="endBtn" id="selectBtn">SELECT SONG</div>
</div>
<script type="module" src="main.js"></script>
</body>
</html>
