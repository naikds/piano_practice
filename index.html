<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Piano Trainer</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      color: #fff;
      font-family: sans-serif;
      overflow: hidden;
    }
    .screen {
      display: none;
      width: 100vw;
      height: 100vh;
      box-sizing: border-box;
    }
    .screen.active {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    ul {
      list-style: none;
      padding: 0;
    }
    li {
      margin: 10px 0;
    }
    button {
      font-size: 18px;
      padding: 10px 20px;
    }
    #screen-play {
      justify-content: flex-start;
    }
    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>
<body>

  <!-- 曲選択 -->
  <div id="screen-select" class="screen active">
    <h1>曲を選択</h1>
    <ul id="song-list"></ul>
  </div>

  <!-- プレイ -->
  <div id="screen-play" class="screen">
    <canvas id="canvas"></canvas>
  </div>

  <!-- 結果 -->
  <div id="screen-result" class="screen">
    <h1>おつかれ！</h1>
    <button id="retry">リトライ</button>
    <button id="back">曲選択へ</button>
  </div>

  <script src="main.js"></script>
</body>
</html>
