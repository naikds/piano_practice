<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport"
        content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<canvas id="gameCanvas"></canvas>
<div id="keyboard"></div>

<div id="startOverlay">TAP TO START</div>

<div id="songMenu">
  <div class="song" data-mode="free">FREE PLAY</div>
  <div class="song" data-url="midi/test_left_to_right.mid">L → R</div>
  <div class="song" data-url="midi/test_right_to_left.mid">R → L</div>
  <div class="song" data-url="midi/test_center_out.mid">Center → Out</div>
</div>

<div id="endMenu">
  <div class="endBtn" id="replayBtn">REPLAY</div>
  <div class="endBtn" id="selectBtn">SELECT SONG</div>
</div>

<script src="main.js"></script>
</body>
</html>
